<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plourà a Cardedeu?</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-yellow: #d29922;
      --rain-yes: #58a6ff;
      --rain-no: #8b949e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 32px 0 24px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    header h1 span { color: var(--accent-blue); }

    header .subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Main prediction card — Polymarket style */
    .prediction-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      text-align: center;
    }

    .prediction-question {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .prediction-subtext {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .probability-ring {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
    }

    .probability-ring svg {
      transform: rotate(-90deg);
    }

    .probability-ring .ring-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 12;
    }

    .probability-ring .ring-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease-out, stroke 0.5s;
    }

    .probability-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .probability-value .pct {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .probability-value .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .probability-value .conf {
      font-size: 12px;
      margin-top: 4px;
      font-weight: 600;
    }

    /* Yes/No buttons like Polymarket */
    .outcome-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .outcome-btn {
      flex: 1;
      max-width: 180px;
      padding: 14px 24px;
      border-radius: 12px;
      border: 2px solid transparent;
      font-size: 18px;
      font-weight: 700;
      cursor: default;
      transition: all 0.3s;
    }

    .outcome-btn.yes {
      background: rgba(88, 166, 255, 0.12);
      color: var(--rain-yes);
      border-color: rgba(88, 166, 255, 0.3);
    }

    .outcome-btn.yes.active {
      background: rgba(88, 166, 255, 0.25);
      border-color: var(--rain-yes);
    }

    .outcome-btn.no {
      background: rgba(139, 148, 158, 0.12);
      color: var(--rain-no);
      border-color: rgba(139, 148, 158, 0.3);
    }

    .outcome-btn.no.active {
      background: rgba(139, 148, 158, 0.25);
      border-color: var(--rain-no);
    }

    .outcome-btn .btn-label { display: block; font-size: 14px; margin-bottom: 2px; }
    .outcome-btn .btn-pct { display: block; font-size: 22px; }
    .outcome-btn .btn-sub { display: block; font-size: 11px; opacity: 0.6; margin-top: 2px; }

    .prediction-meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 16px;
    }

    .conf-low { color: var(--accent-green); }
    .conf-medium { color: var(--accent-yellow); }
    .conf-high { color: var(--accent-red); }

    /* Chart */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .chart-card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 220px;
      width: 100%;
    }

    canvas { width: 100% !important; height: 100% !important; }

    /* Conditions grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .info-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      font-size: 14px;
    }

    .stat-row:last-child { border-bottom: none; }
    .stat-row .stat-label { color: var(--text-muted); }
    .stat-row .stat-value { font-weight: 600; }

    /* Sources bar */
    .sources-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .sources-bar .source-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .sources-bar .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .sources-bar .dot.active { background: var(--accent-green); }
    .sources-bar .dot.inactive { background: var(--text-muted); }

    /* Rain gate */
    .gate-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    .gate-indicator.open { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
    .gate-indicator.closed { background: rgba(139, 148, 158, 0.1); color: var(--text-muted); }

    .gate-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .gate-indicator.open .gate-dot { background: var(--accent-blue); animation: pulse 2s infinite; }
    .gate-indicator.closed .gate-dot { background: var(--text-muted); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    footer a { color: var(--accent-blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Resolution History — Calendar */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .history-card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .history-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* Month nav */
    .cal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .cal-nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cal-nav-btn:hover { background: rgba(48, 54, 61, 0.8); }
    .cal-nav-btn:disabled { opacity: 0.3; cursor: default; }

    .cal-month-label {
      font-weight: 600;
      font-size: 15px;
    }

    /* Month stats */
    .cal-month-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 10px;
      font-size: 13px;
    }

    .cal-stat { color: var(--text-muted); }
    .cal-stat strong { color: var(--text); }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 16px;
    }

    .cal-weekday {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 0;
      font-weight: 600;
      text-transform: uppercase;
    }

    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: default;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .cal-day.empty { visibility: hidden; }
    .cal-day.no-data { background: var(--surface2); color: var(--text-muted); }
    .cal-day.has-data { cursor: pointer; }
    .cal-day.has-data:hover { transform: scale(1.1); z-index: 2; }
    .cal-day.selected { border-color: var(--accent-blue); }
    .cal-day.today { box-shadow: inset 0 0 0 1px var(--accent-blue); }

    /* Day cell colors */
    .cal-day.perfect { background: rgba(63, 185, 80, 0.25); color: var(--accent-green); }
    .cal-day.good { background: rgba(210, 153, 34, 0.2); color: var(--accent-yellow); }
    .cal-day.bad { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); }
    .cal-day.pending-day { background: rgba(210, 153, 34, 0.1); color: var(--accent-yellow); }
    .cal-day.rain-day { background: rgba(88, 166, 255, 0.2); color: var(--accent-blue); }

    .cal-day-num { font-weight: 600; line-height: 1; }
    .cal-day-icon { font-size: 10px; margin-top: 2px; }

    /* Legend */
    .cal-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .cal-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Day detail panel */
    .day-detail {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: slideDown 0.2s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .day-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface2);
    }

    .day-detail-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .day-detail-date {
      font-weight: 600;
      font-size: 15px;
    }

    .day-resolution {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .day-resolution.rain { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
    .day-resolution.no-rain { background: rgba(139, 148, 158, 0.1); color: var(--text-muted); }
    .day-resolution.pending { background: rgba(210, 153, 34, 0.1); color: var(--accent-yellow); }

    .day-detail-accuracy {
      font-size: 13px;
      font-weight: 600;
    }

    .day-detail-accuracy.perfect { color: var(--accent-green); }
    .day-detail-accuracy.good { color: var(--accent-yellow); }
    .day-detail-accuracy.bad { color: var(--accent-red); }

    .day-detail-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
    }

    .day-detail-close:hover { color: var(--text); }

    .pred-header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      gap: 12px;
      border-top: 1px solid rgba(48, 54, 61, 0.4);
      background: rgba(48, 54, 61, 0.15);
    }

    .pred-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid rgba(48, 54, 61, 0.4);
      font-size: 13px;
      gap: 12px;
    }

    .pred-row:hover { background: rgba(48, 54, 61, 0.3); }

    .pred-time {
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      min-width: 45px;
    }

    .pred-prob-bar {
      flex: 1;
      max-width: 200px;
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }

    .pred-prob-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .pred-pct {
      font-weight: 600;
      min-width: 42px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .pred-said {
      min-width: 70px;
      font-size: 12px;
    }

    .pred-result {
      min-width: 70px;
      font-size: 12px;
      font-weight: 600;
    }

    .pred-result.correct { color: var(--accent-green); }
    .pred-result.wrong { color: var(--accent-red); }
    .pred-result.pending { color: var(--accent-yellow); }

    .pred-rain-mm {
      color: var(--text-muted);
      font-size: 12px;
      min-width: 55px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .prediction-question { font-size: 18px; }
      .probability-value .pct { font-size: 42px; }
      .probability-ring { width: 160px; height: 160px; }
      .outcome-btn { padding: 10px 16px; }
      .outcome-btn .btn-pct { font-size: 18px; }
      .pred-prob-bar { display: none; }
      .pred-row { gap: 8px; }
      .pred-header { display: none; }
      .cal-month-stats { gap: 10px; font-size: 12px; }
      .cal-day { font-size: 11px; border-radius: 6px; }
      .day-detail-header { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌧️ Plourà a <span>Cardedeu</span>?</h1>
      <p class="subtitle">Predicció hiperlocal de pluja — IA entrenada amb dades reals</p>
    </header>

    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregant predicció...</p>
      </div>
    </div>

    <footer>
      <p>Dades de <a href="https://www.meteo.cat" target="_blank" rel="noopener">Meteocat</a> · <a href="https://www.aemet.es" target="_blank" rel="noopener">AEMET</a> · <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></p>
      <p style="margin-top:4px"><a href="https://github.com/albertolive/nowcast-cardedeu" target="_blank" rel="noopener">GitHub</a> · Model XGBoost + calibració isotònica</p>
    </footer>
  </div>

<script>
const REPO = 'albertolive/nowcast-cardedeu';
const BRANCH = 'main';
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/data`;

async function fetchJSON(filename) {
  // Try local (GitHub Pages docs/) first, fall back to raw.githubusercontent.com
  for (const base of ['.', RAW_BASE]) {
    try {
      const r = await fetch(`${base}/${filename}`, { cache: 'no-cache' });
      if (r.ok) return r.json();
    } catch {}
  }
  throw new Error(`No s'ha pogut carregar ${filename}`);
}

async function fetchJSONL(filename) {
  for (const base of ['.', RAW_BASE]) {
    try {
      const r = await fetch(`${base}/${filename}`, { cache: 'no-cache' });
      if (r.ok) {
        const text = await r.text();
        return text.trim().split('\n').filter(Boolean).map(line => JSON.parse(line));
      }
    } catch {}
  }
  throw new Error(`No s'ha pogut carregar ${filename}`);
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString('ca-ES', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}

function fmtTimeShort(iso) {
  const d = new Date(iso);
  return d.toLocaleString('ca-ES', { hour: '2-digit', minute: '2-digit' });
}

function getProbColor(pct) {
  if (pct >= 60) return 'var(--accent-blue)';
  if (pct >= 35) return 'var(--accent-yellow)';
  return 'var(--accent-green)';
}

function renderPrediction(latest, history) {
  const pct = latest.probability_pct;
  const noPct = (100 - pct).toFixed(1);
  const color = getProbColor(pct);
  const circumference = 2 * Math.PI * 88;
  const offset = circumference * (1 - pct / 100);
  const confColor = pct >= 60 ? 'conf-high' : pct >= 35 ? 'conf-medium' : 'conf-low';
  const gateOpen = latest.rain_gate_open;

  // Verified history stats
  const verified = history.filter(h => h.verified);
  const correct = verified.filter(h => h.correct).length;
  const accuracy = verified.length > 0 ? ((correct / verified.length) * 100).toFixed(0) : '—';

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Main prediction -->
    <div class="prediction-card">
      <div class="prediction-question">Plourà a Cardedeu en les properes 4 hores?</div>
      <div class="prediction-subtext">${fmtTime(latest.timestamp)}</div>

      <div class="probability-ring">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <circle class="ring-bg" cx="100" cy="100" r="88"/>
          <circle class="ring-fill" cx="100" cy="100" r="88"
            stroke="${color}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="probability-value">
          <div class="pct" style="color:${color}">${pct}%</div>
          <div class="label">probabilitat</div>
          <div class="conf ${confColor}">${latest.confidence}</div>
        </div>
      </div>

      <div class="outcome-buttons">
        <div class="outcome-btn yes ${latest.will_rain ? 'active' : ''}">
          <span class="btn-label">🌧️ Sí, plourà</span>
          <span class="btn-pct">${pct}%</span>
        </div>
        <div class="outcome-btn no ${!latest.will_rain ? 'active' : ''}">
          <span class="btn-label">☀️ No plourà</span>
          <span class="btn-pct">${noPct}%</span>
        </div>
      </div>

      <div class="gate-indicator ${gateOpen ? 'open' : 'closed'}">
        <span class="gate-dot"></span>
        ${gateOpen ? '🌧️ Senyals de pluja detectats — radar, llamps o previsions oficials actius' : '☀️ Cap senyal de pluja — radar, llamps i previsions oficials en calma'}
      </div>

      <div class="prediction-meta">
        Precisió histórica: <strong style="color:var(--accent-green)">${accuracy}%</strong> (${correct}/${verified.length})
        · ${latest.features_used || '—'} features · Calibrat isotònic
      </div>
    </div>

    <!-- Probability chart -->
    <div class="chart-card">
      <h2>📈 Evolució de la probabilitat (últimes 24h)</h2>
      <div class="chart-container">
        <canvas id="probChart"></canvas>
      </div>
    </div>

    <div class="grid">
      <!-- Conditions -->
      <div class="info-card">
        <h3>🌡️ Condicions actuals</h3>
        ${renderConditions(latest)}
      </div>

      <!-- Radar -->
      <div class="info-card">
        <h3>📡 Radar</h3>
        ${renderRadar(latest)}
      </div>

      <!-- Atmospheric -->
      <div class="info-card">
        <h3>🌀 Atmosfera</h3>
        ${renderAtmosphere(latest)}
      </div>

      <!-- Model info -->
      <div class="info-card">
        <h3>🤖 Model</h3>
        <div class="stat-row">
          <span class="stat-label">Prob. crua</span>
          <span class="stat-value">${latest.raw_probability != null ? (latest.raw_probability * 100).toFixed(1) + '%' : '—'}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Prob. calibrada</span>
          <span class="stat-value" style="color:${color}">${pct}%</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Threshold</span>
          <span class="stat-value">${latest.threshold ? (latest.threshold * 100).toFixed(1) + '%' : '—'}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Calibració</span>
          <span class="stat-value">${latest.calibrated ? 'Isotònica' : 'No'}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Features</span>
          <span class="stat-value">${latest.features_used || '—'}</span>
        </div>
      </div>
    </div>

    <!-- Sources bar -->
    <div class="sources-bar">
      <span style="font-weight:600">Fonts:</span>
      ${renderSources(latest)}
    </div>

    <!-- Resolution History -->
    <div class="history-card">
      <h2>📋 Historial de resolucions</h2>
      <p class="history-subtitle">
        Cada predicció es verifica amb dades reals. Clica un dia per veure el detall.
      </p>
      <div id="calendar-root"></div>
    </div>
  `;

  initCalendar(history);
  drawChart(history);
}

function renderConditions(d) {
  const c = d.conditions || {};
  return `
    <div class="stat-row"><span class="stat-label">Temperatura</span><span class="stat-value">${c.temperature || '—'}°C</span></div>
    <div class="stat-row"><span class="stat-label">Humitat</span><span class="stat-value">${c.humidity || '—'}%</span></div>
    <div class="stat-row"><span class="stat-label">Pressió</span><span class="stat-value">${c.pressure || '—'} hPa</span></div>
    <div class="stat-row"><span class="stat-label">Vent</span><span class="stat-value">${c.wind_speed || '—'} km/h ${c.wind_dir || ''}</span></div>
    <div class="stat-row"><span class="stat-label">Pluja avui</span><span class="stat-value">${c.rain_today || '0.0'} mm</span></div>
  `;
}

function renderRadar(d) {
  const r = d.radar || {};
  return `
    <div class="stat-row"><span class="stat-label">dBZ</span><span class="stat-value">${r.dbz ?? '—'}</span></div>
    <div class="stat-row"><span class="stat-label">Eco proper</span><span class="stat-value">${r.nearest_echo_km ?? '—'} km ${r.nearest_echo_compass || ''}</span></div>
    <div class="stat-row"><span class="stat-label">Cobertura 20km</span><span class="stat-value">${r.coverage_20km != null ? r.coverage_20km + '%' : '—'}</span></div>
    <div class="stat-row"><span class="stat-label">Apropa?</span><span class="stat-value">${r.approaching ? '⚠️ Sí' : '—'}</span></div>
    <div class="stat-row"><span class="stat-label">ETA</span><span class="stat-value">${r.storm_eta_min ? r.storm_eta_min + ' min' : '—'}</span></div>
  `;
}

function renderSources(d) {
  const sources = [
    { name: 'XEMA', active: d.conditions?.temperature != null },
    { name: 'Radar SMC', active: d.radar?.dbz != null },
    { name: 'XDDE', active: true },
    { name: 'Predicció SMC', active: d.aemet || true },
    { name: 'AEMET', active: d.aemet?.prob_precip != null },
    { name: 'Open-Meteo', active: d.ensemble?.total_models > 0 },
  ];
  return sources.map(s => `
    <span class="source-item">
      <span class="dot ${s.active ? 'active' : 'inactive'}"></span>
      ${s.name}
    </span>
  `).join('');
}

function renderAtmosphere(d) {
  const p = d.pressure_levels || {};
  const w = d.wind_regime || {};
  const regime = w.is_llevantada ? '🌊 Llevantada' :
                 w.is_tramuntana ? '💨 Tramuntana' :
                 w.is_migjorn ? '🌡️ Migjorn' :
                 w.is_garbi ? '🌬️ Garbí' :
                 w.is_ponent ? '🔥 Ponent' : '— Neutre';
  return `
    <div class="stat-row"><span class="stat-label">Règim de vent</span><span class="stat-value">${regime}</span></div>
    <div class="stat-row"><span class="stat-label">Temp 850hPa</span><span class="stat-value">${p.temp_850 ?? '—'}°C</span></div>
    <div class="stat-row"><span class="stat-label">VT Index</span><span class="stat-value">${p.vt_index ?? '—'}</span></div>
    <div class="stat-row"><span class="stat-label">TT Index</span><span class="stat-value">${p.tt_index != null ? p.tt_index.toFixed(1) : '—'}</span></div>
    <div class="stat-row"><span class="stat-label">Humitat 850hPa</span><span class="stat-value">${p.rh_850 ?? '—'}%</span></div>
  `;
}

/* ---- Calendar-based Resolution History ---- */
function initCalendar(history) {
  const root = document.getElementById('calendar-root');
  if (!root) return;

  // Group predictions by day
  const dayMap = {};
  for (const h of history) {
    const day = h.timestamp.slice(0, 10);
    if (!dayMap[day]) dayMap[day] = [];
    dayMap[day].push(h);
  }

  // Find date range
  const allDays = Object.keys(dayMap).sort();
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDay = null;

  const WEEKDAYS = ['dl', 'dt', 'dc', 'dj', 'dv', 'ds', 'dg'];

  function getDaySummary(dayKey) {
    const preds = dayMap[dayKey];
    if (!preds) return null;
    const verified = preds.filter(p => p.verified);
    const correct = verified.filter(p => p.correct).length;
    const anyRain = preds.some(p => p.actual_rain === true);
    const allPending = verified.length === 0;
    const rainMm = preds.reduce((max, p) => Math.max(max, p.actual_rain_mm || 0), 0);
    const acc = verified.length > 0 ? (correct / verified.length) : null;
    return { preds, verified, correct, anyRain, allPending, rainMm, acc, count: preds.length };
  }

  function render() {
    const year = currentYear;
    const month = currentMonth;
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    // Monday=0 start
    let startWeekday = (firstDay.getDay() + 6) % 7;

    const monthLabel = firstDay.toLocaleDateString('ca-ES', { month: 'long', year: 'numeric' });

    // Month stats
    let mVerified = 0, mCorrect = 0, mPreds = 0, mRainDays = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const s = getDaySummary(key);
      if (s) {
        mPreds += s.count;
        mVerified += s.verified.length;
        mCorrect += s.correct;
        if (s.anyRain) mRainDays++;
      }
    }
    const mAcc = mVerified > 0 ? ((mCorrect / mVerified) * 100).toFixed(0) : '—';

    // Can navigate?
    const earliest = allDays.length > 0 ? allDays[0] : `${year}-${String(month + 1).padStart(2, '0')}-01`;
    const earliestDate = new Date(earliest + 'T12:00:00');
    const canPrev = year > earliestDate.getFullYear() || (year === earliestDate.getFullYear() && month > earliestDate.getMonth());
    const canNext = year < today.getFullYear() || (year === today.getFullYear() && month < today.getMonth());

    // Build calendar cells
    let cells = '';
    // Weekday headers
    for (const wd of WEEKDAYS) {
      cells += `<div class="cal-weekday">${wd}</div>`;
    }
    // Empty cells before first day
    for (let i = 0; i < startWeekday; i++) {
      cells += `<div class="cal-day empty"></div>`;
    }
    // Day cells
    const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const s = getDaySummary(key);
      const isToday = key === todayKey;
      const isSelected = key === selectedDay;

      let cls = 'cal-day';
      let icon = '';
      if (!s) {
        cls += ' no-data';
      } else {
        cls += ' has-data';
        if (s.allPending) {
          cls += ' pending-day';
          icon = '⏳';
        } else if (s.anyRain) {
          cls += ' rain-day';
          icon = '🌧️';
        } else if (s.acc >= 0.9) {
          cls += ' perfect';
          icon = '✓';
        } else if (s.acc >= 0.6) {
          cls += ' good';
          icon = '~';
        } else {
          cls += ' bad';
          icon = '✗';
        }
      }
      if (isToday) cls += ' today';
      if (isSelected) cls += ' selected';

      cells += `<div class="${cls}" data-day="${key}">
        <span class="cal-day-num">${d}</span>
        ${icon ? `<span class="cal-day-icon">${icon}</span>` : ''}
      </div>`;
    }

    let html = `
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev" ${canPrev ? '' : 'disabled'}>← Anterior</button>
        <span class="cal-month-label">${monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1)}</span>
        <button class="cal-nav-btn" id="cal-next" ${canNext ? '' : 'disabled'}>Següent →</button>
      </div>

      <div class="cal-month-stats">
        <span class="cal-stat">Prediccions: <strong>${mPreds}</strong></span>
        <span class="cal-stat">Verificades: <strong>${mVerified}</strong></span>
        <span class="cal-stat">Precisió: <strong>${mAcc}%</strong></span>
        <span class="cal-stat">Dies de pluja: <strong>${mRainDays}</strong></span>
      </div>

      <div class="cal-grid">${cells}</div>

      <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-legend-dot" style="background:rgba(63,185,80,0.25)"></span> Tot correcte</span>
        <span class="cal-legend-item"><span class="cal-legend-dot" style="background:rgba(88,166,255,0.2)"></span> Dia de pluja</span>
        <span class="cal-legend-item"><span class="cal-legend-dot" style="background:rgba(210,153,34,0.2)"></span> Pendent</span>
        <span class="cal-legend-item"><span class="cal-legend-dot" style="background:rgba(248,81,73,0.2)"></span> Errors</span>
        <span class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--surface2)"></span> Sense dades</span>
      </div>

      <div id="day-detail-panel"></div>
    `;

    root.innerHTML = html;

    // If a day is selected, render its detail
    if (selectedDay && dayMap[selectedDay]) {
      renderDayDetail(selectedDay);
    }

    // Event listeners
    document.getElementById('cal-prev')?.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      render();
    });
    document.getElementById('cal-next')?.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      render();
    });
    root.querySelectorAll('.cal-day.has-data').forEach(el => {
      el.addEventListener('click', () => {
        const day = el.dataset.day;
        selectedDay = selectedDay === day ? null : day;
        render();
      });
    });
  }

  function renderDayDetail(dayKey) {
    const panel = document.getElementById('day-detail-panel');
    if (!panel) return;
    const s = getDaySummary(dayKey);
    if (!s) { panel.innerHTML = ''; return; }

    const d = new Date(dayKey + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('ca-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    let resolutionCls, resolutionText;
    if (s.allPending) {
      resolutionCls = 'pending';
      resolutionText = '⏳ Pendent';
    } else if (s.anyRain) {
      resolutionCls = 'rain';
      resolutionText = `🌧️ Va ploure (${s.rainMm.toFixed(1)} mm)`;
    } else {
      resolutionCls = 'no-rain';
      resolutionText = '☀️ No va ploure';
    }

    let accCls = '', accText = '';
    if (s.verified.length > 0) {
      const pct = ((s.correct / s.verified.length) * 100).toFixed(0);
      accCls = pct >= 90 ? 'perfect' : pct >= 60 ? 'good' : 'bad';
      accText = `${s.correct}/${s.verified.length} encerts`;
    }

    const predRows = s.preds.map(p => {
      const t = new Date(p.timestamp);
      const time = t.toLocaleString('ca-ES', { hour: '2-digit', minute: '2-digit' });
      const pct = p.probability_pct;
      const color = getProbColor(pct);
      const said = p.will_rain ? '🌧️ Plourà' : '☀️ No plourà';
      let resultText, resultCls;
      if (!p.verified) {
        resultText = '⏳ Pendent';
        resultCls = 'pending';
      } else if (p.correct) {
        resultText = '✅ Encert';
        resultCls = 'correct';
      } else {
        resultText = '❌ Error';
        resultCls = 'wrong';
      }
      const rainInfo = p.actual_rain_mm != null ? `${p.actual_rain_mm.toFixed(1)} mm` : '—';
      return `
        <div class="pred-row">
          <span class="pred-time">${time}</span>
          <div class="pred-prob-bar"><div class="pred-prob-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="pred-pct" style="color:${color}">${pct}%</span>
          <span class="pred-said">${said}</span>
          <span class="pred-result ${resultCls}">${resultText}</span>
          <span class="pred-rain-mm">${rainInfo}</span>
        </div>`;
    }).join('');

    const tableHeader = `
      <div class="pred-header">
        <span class="pred-time">Hora</span>
        <div class="pred-prob-bar"></div>
        <span class="pred-pct">Prob.</span>
        <span class="pred-said">Vam dir</span>
        <span class="pred-result">Resultat</span>
        <span class="pred-rain-mm">Pluja real</span>
      </div>`;

    panel.innerHTML = `
      <div class="day-detail">
        <div class="day-detail-header">
          <div class="day-detail-left">
            <span class="day-detail-date">${dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1)}</span>
            <span class="day-resolution ${resolutionCls}">${resolutionText}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="day-detail-accuracy ${accCls}">${accText}</span>
            <button class="day-detail-close" id="close-detail" title="Tancar">✕</button>
          </div>
        </div>
        ${tableHeader}
        ${predRows}
      </div>`;

    document.getElementById('close-detail')?.addEventListener('click', () => {
      selectedDay = null;
      render();
    });
  }

  render();
}

/* ---- Lightweight Chart (pure Canvas, no dependencies) ---- */
function drawChart(history) {
  const canvas = document.getElementById('probChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  // Data
  const now = Date.now();
  const cutoff = now - 24 * 60 * 60 * 1000;
  const points = history
    .filter(h => new Date(h.timestamp).getTime() > cutoff)
    .map(h => ({ t: new Date(h.timestamp).getTime(), p: h.probability_pct }));

  if (points.length < 2) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Acumulant dades...', W / 2, H / 2);
    return;
  }

  const pad = { top: 20, right: 16, bottom: 32, left: 42 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const tMin = points[0].t;
  const tMax = points[points.length - 1].t;
  const tRange = tMax - tMin || 1;

  const x = t => pad.left + ((t - tMin) / tRange) * cW;
  const y = p => pad.top + cH - (p / 100) * cH;

  // Grid lines
  ctx.strokeStyle = 'rgba(48,54,61,0.5)';
  ctx.lineWidth = 1;
  for (let pct of [0, 25, 50, 75, 100]) {
    const yy = y(pct);
    ctx.beginPath();
    ctx.moveTo(pad.left, yy);
    ctx.lineTo(W - pad.right, yy);
    ctx.stroke();

    ctx.fillStyle = '#8b949e';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(pct + '%', pad.left - 6, yy + 4);
  }

  // Threshold line
  const threshY = y(35.4);
  ctx.strokeStyle = 'rgba(248,81,73,0.3)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(pad.left, threshY);
  ctx.lineTo(W - pad.right, threshY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Area fill
  const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
  gradient.addColorStop(0, 'rgba(88,166,255,0.25)');
  gradient.addColorStop(1, 'rgba(88,166,255,0.02)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.moveTo(x(points[0].t), y(0));
  for (const pt of points) ctx.lineTo(x(pt.t), y(pt.p));
  ctx.lineTo(x(points[points.length - 1].t), y(0));
  ctx.closePath();
  ctx.fill();

  // Line
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < points.length; i++) {
    const px = x(points[i].t);
    const py = y(points[i].p);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Latest dot
  const last = points[points.length - 1];
  ctx.beginPath();
  ctx.arc(x(last.t), y(last.p), 5, 0, Math.PI * 2);
  ctx.fillStyle = '#58a6ff';
  ctx.fill();
  ctx.strokeStyle = '#0d1117';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Time labels — evenly spaced along time axis, with collision avoidance
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  const maxLabels = Math.min(6, Math.floor(cW / 70));
  const minLabelGap = 60;
  let lastLabelX = -Infinity;

  for (let i = 0; i <= maxLabels; i++) {
    const t = tMin + (tRange * i) / maxLabels;
    const px = x(t);
    if (px - lastLabelX < minLabelGap) continue;
    const d = new Date(t);
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    ctx.fillText(`${h}:${m}`, px, H - 8);
    lastLabelX = px;
  }

  // Threshold label
  ctx.fillStyle = 'rgba(248,81,73,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('threshold', pad.left + 4, threshY - 4);
}

/* ---- Init ---- */
async function init() {
  try {
    const [latest, history] = await Promise.all([
      fetchJSON('latest_prediction.json'),
      fetchJSONL('predictions_log.jsonl')
    ]);
    renderPrediction(latest, history);

    // Resize chart on window resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => drawChart(history), 200);
    });
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="prediction-card" style="color:var(--accent-red)">
        <p>Error carregant dades: ${err.message}</p>
        <p style="color:var(--text-muted);font-size:13px;margin-top:8px">
          Comprova que el repositori és públic o actualitza la URL.
        </p>
      </div>
    `;
  }
}

init();
