name: "🌧️ Nowcast Cardedeu"

on:
  schedule:
    # Predicció cada 10 min → gestionada per cron-job.org via workflow_dispatch
    # (GitHub Actions cron no garanteix intervals curts)
    # Resum diari a les 7:00 Barcelona (6:00 UTC en horari d'estiu)
    - cron: "0 6 * * *"
    # Informe d'accuracy setmanal (dilluns 8:00 Barcelona = 7:00 UTC estiu)
    - cron: "0 7 * * 1"
    # Re-entrenar diàriament (3:00 Barcelona = 2:00 UTC estiu)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Acció a executar"
        required: false
        default: "predict"
        type: choice
        options:
          - predict
          - daily_summary
          - accuracy_report
          - retrain

permissions:
  contents: write

env:
  TZ: Europe/Madrid
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  METEOCAT_API_KEY: ${{ secrets.METEOCAT_API_KEY }}
  AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: predict-push
      cancel-in-progress: false
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.action == 'predict' || github.event.inputs.action == '')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Run prediction
        id: nowcast
        run: python scripts/predict_now.py

      - name: Commit prediction data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          # Copy data to docs/ for GitHub Pages dashboard
          cp -f data/latest_prediction.json docs/latest_prediction.json 2>/dev/null || true
          cp -f data/predictions_log.jsonl docs/predictions_log.jsonl 2>/dev/null || true
          git add data/predictions_log.jsonl data/notification_state.json data/latest_prediction.json
          git add data/aemet_cache.json 2>/dev/null || true
          git add docs/latest_prediction.json docs/predictions_log.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 Prediction $(date -u +%Y-%m-%dT%H:%M)"
          git push || (git pull --rebase origin main && git push)

      - name: Upload prediction artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-${{ github.run_number }}
          path: data/latest_prediction.json
          retention-days: 30

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>predict</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  daily_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'daily_summary')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Send daily summary
        run: python scripts/daily_summary.py

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>daily_summary</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  # Informe d'accuracy setmanal (dilluns a les 8:00)
  accuracy_report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 7 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'accuracy_report')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Send accuracy report
        run: python scripts/accuracy_report.py

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>accuracy_report</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  # Re-entrenar el model setmanalment (diumenge a les 3am)
  retrain:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '0 2 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'retrain')
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Download historical data
        run: python scripts/download_history.py

      - name: Validate downloaded data
        run: |
          python << 'EOF'
          import pandas as pd, sys
          for f, min_rows in [('data/raw/station_daily.parquet', 1000), ('data/raw/open_meteo_hourly.parquet', 10000)]:
              df = pd.read_parquet(f)
              if len(df) < min_rows:
                  print(f'ERROR: {f} té només {len(df)} files (mínim {min_rows})')
                  sys.exit(1)
              print(f'OK: {f} → {len(df)} files')
          EOF

      - name: Build training dataset
        run: python scripts/build_dataset.py

      - name: Train model
        run: python scripts/train_model.py

      - name: Validate model quality
        run: |
          python << 'EOF'
          import json, sys
          with open('models/metrics.json') as f:
              m = json.load(f)
          auc = m.get('cv_auc_mean', 0)
          f1 = m.get('cv_f1_mean', 0)
          print(f'AUC={auc:.4f}, F1={f1:.4f}')
          if auc < 0.70:
              print(f'ERROR: AUC {auc:.4f} massa baix (mínim 0.70) — model rebutjat')
              sys.exit(1)
          print('Model quality OK')
          EOF

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ data/processed/ data/predictions_log.jsonl
          git diff --cached --quiet || git commit -m "🤖 Retrain model $(date +%Y-%m-%d)"
          git push

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>retrain</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"
