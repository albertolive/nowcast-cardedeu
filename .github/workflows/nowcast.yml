name: "🌧️ Nowcast Cardedeu"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config.py"
      - "tests/**"
      - "requirements.txt"
  schedule:
    # Re-entrenar setmanalment (diumenge 3:00 Barcelona = 2:00 UTC estiu)
    - cron: "0 2 * * 0"
    # Resum diari (07:00 Barcelona = 05:00 UTC estiu / 06:00 UTC hivern; acceptem ±30min jitter)
    - cron: "0 5 * * *"
    # Informe d'accuracy setmanal (dilluns 08:00 Barcelona = 06:00 UTC estiu)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      action:
        description: "Acció a executar"
        required: false
        default: "predict"
        type: choice
        options:
          - predict
          - daily_summary
          - accuracy_report
          - retrain

permissions:
  contents: write

env:
  TZ: Europe/Madrid
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  METEOCAT_API_KEY: ${{ secrets.METEOCAT_API_KEY }}
  AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
  AI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'retrain')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Run offline tests
        run: python -m pytest tests/ -m "not network" -v --tb=short

  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: predict-push
      cancel-in-progress: false
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.action == 'predict' || github.event.inputs.action == '')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Run prediction
        id: nowcast
        run: python scripts/predict_now.py

      - name: Trim predictions log if past high-water mark
        # Verified rows are persisted to data/processed/feedback_verified.parquet by every retrain (append-only),
        # so we can safely cap the JSONL. Trim runs inside the predict job so it serialises
        # under the existing predict-push concurrency group — no races with other predict ticks.
        run: |
          MAX=5000
          HIGH_WATER=6000
          FILE=data/predictions_log.jsonl
          line_count=$(wc -l < "$FILE" 2>/dev/null || echo 0)
          if [ "$line_count" -gt "$HIGH_WATER" ]; then
            echo "Trimming $FILE: $line_count → $MAX lines"
            tail -n "$MAX" "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE"
          fi

      - name: Commit prediction data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          cp -f data/latest_prediction.json docs/latest_prediction.json 2>/dev/null || true
          # Slim predictions log into docs/ so dashboards (Vercel + GH Pages) serve fresh history.
          # Write to .tmp and mv on success so a parse error never leaves an empty file.
          python3 -c "
          import json
          KEEP = {'timestamp','probability_pct','rain_category','verified','actual_rain','actual_rain_mm','correct'}
          with open('data/predictions_log.jsonl') as f:
              for raw in f:
                  raw = raw.strip()
                  if not raw: continue
                  try:
                      obj = json.loads(raw)
                      print(json.dumps({k: obj[k] for k in KEEP if k in obj}, separators=(',',':')))
                  except Exception:
                      pass
          " > docs/predictions_log.jsonl.tmp && mv docs/predictions_log.jsonl.tmp docs/predictions_log.jsonl
          git add data/predictions_log.jsonl data/notification_state.json data/latest_prediction.json
          git add data/aemet_cache.json 2>/dev/null || true
          git add data/meteocat_cache.json 2>/dev/null || true
          git add docs/latest_prediction.json docs/predictions_log.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 Prediction $(date -u +%Y-%m-%dT%H:%M)"
          git push || (git pull --rebase origin main && git push)

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>predict</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  daily_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 5 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'daily_summary')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Send daily summary
        run: python scripts/daily_summary.py

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>daily_summary</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  # Informe d'accuracy setmanal (dilluns a les 8:00)
  accuracy_report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 6 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'accuracy_report')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Send accuracy report
        run: python scripts/accuracy_report.py

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>accuracy_report</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"

  # Re-entrenar el model setmanalment (diumenge a les 3am)
  retrain:
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '0 2 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'retrain')
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Activate venv
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Cache raw data (incremental downloads)
        uses: actions/cache@v4
        with:
          path: data/raw
          key: raw-data-${{ hashFiles('src/data/open_meteo.py') }}
          restore-keys: |
            raw-data-

      - name: Download historical data
        run: python scripts/download_history.py

      - name: Validate downloaded data
        run: |
          python << 'EOF'
          import pandas as pd, sys
          for f, min_rows in [('data/raw/station_daily.parquet', 1000), ('data/raw/open_meteo_hourly.parquet', 10000)]:
              df = pd.read_parquet(f)
              if len(df) < min_rows:
                  print(f'ERROR: {f} té només {len(df)} files (mínim {min_rows})')
                  sys.exit(1)
              print(f'OK: {f} → {len(df)} files')
          EOF

      - name: Build training dataset
        run: |
          python scripts/backfill_ensemble.py
          python scripts/backfill_xema.py --max-days 3 || echo "XEMA backfill skipped (API limit or no key)"
          python scripts/build_dataset.py

      - name: Train model
        run: python scripts/train_model.py

      - name: Validate model quality
        run: |
          python << 'EOF'
          import json, sys
          with open('models/metrics.json') as f:
              m = json.load(f)
          auc = m.get('cv_auc_mean', 0)
          f1 = m.get('cv_f1_mean', 0)
          print(f'AUC={auc:.4f}, F1={f1:.4f}')
          if auc < 0.70:
              print(f'ERROR: AUC {auc:.4f} massa baix (mínim 0.70) — model rebutjat')
              sys.exit(1)
          print('Model quality OK')
          EOF

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ data/processed/
          git diff --cached --quiet && exit 0
          git commit -m "🤖 Retrain model $(date +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git push && exit 0
            echo "Push failed (attempt $attempt), pulling and retrying..."
            git pull --rebase origin main || {
              echo "Rebase conflict — aborting and retrying..."
              git rebase --abort 2>/dev/null || true
              git pull --rebase origin main
            }
          done
          echo "ERROR: Failed to push after 3 attempts"
          exit 1

      - name: Notificar fallada per Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="🔴 <b>Nowcast FALLADA</b>: Job <code>retrain</code> ha fallat.%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Veure logs</a>"
