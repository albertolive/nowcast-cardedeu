name: "🌧️ Nowcast Cardedeu"

on:
  schedule:
    # Cada 15 minuts, de 6h a 23h (hora de Barcelona = UTC+1/+2)
    - cron: "*/15 5-22 * * *"
    # Resum diari a les 7:00 Barcelona (6:00 UTC en horari d'estiu)
    - cron: "0 6 * * *"
    # Informe d'accuracy setmanal (dilluns 8:00 Barcelona = 7:00 UTC estiu)
    - cron: "0 7 * * 1"
    # Re-entrenar setmanalment (diumenge 3:00 Barcelona = 2:00 UTC estiu)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      action:
        description: "Acció a executar"
        required: false
        default: "predict"
        type: choice
        options:
          - predict
          - daily_summary
          - accuracy_report
          - retrain

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  METEOCAT_API_KEY: ${{ secrets.METEOCAT_API_KEY }}

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '*/15 5-22 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'predict')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: data/notification_state.json
          key: notification-state-${{ github.ref }}
          restore-keys: notification-state-

      - name: Restore predictions log
        uses: actions/cache@v4
        with:
          path: data/predictions_log.jsonl
          key: predictions-log-${{ github.ref }}
          restore-keys: predictions-log-

      - name: Run prediction
        id: nowcast
        run: python scripts/predict_now.py

      - name: Upload prediction artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-${{ github.run_number }}
          path: data/latest_prediction.json
          retention-days: 30

  daily_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'daily_summary')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily summary
        run: python scripts/daily_summary.py

  # Informe d'accuracy setmanal (dilluns a les 8:00)
  accuracy_report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.schedule == '0 7 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'accuracy_report')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore predictions log
        uses: actions/cache@v4
        with:
          path: data/predictions_log.jsonl
          key: predictions-log-${{ github.ref }}
          restore-keys: predictions-log-

      - name: Send accuracy report
        run: python scripts/accuracy_report.py

  # Re-entrenar el model setmanalment (diumenge a les 3am)
  retrain:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '0 2 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'retrain')
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore predictions log
        uses: actions/cache@v4
        with:
          path: data/predictions_log.jsonl
          key: predictions-log-${{ github.ref }}
          restore-keys: predictions-log-

      - name: Download historical data
        run: python scripts/download_history.py

      - name: Build training dataset
        run: python scripts/build_dataset.py

      - name: Train model
        run: python scripts/train_model.py

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ data/processed/
          git diff --cached --quiet || git commit -m "🤖 Retrain model $(date +%Y-%m-%d)"
          git push
